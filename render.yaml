services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: spinqms-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # ── Supabase Transaction Pooler (port 6543) ──────────────────────────────
      # Get this from: Supabase Dashboard → Project → Settings → Database
      # Choose "Transaction mode" (Supavisor) — port 6543.
      # Format: postgresql://postgres.[ref]:[password]@aws-0-ap-southeast-1.pooler.supabase.com:6543/postgres
      # Supabase project ref: homjuhxvoxrtknounjqz (ap-southeast-1)
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── React Frontend (Static Site) ────────────────────────────────────────────
  - type: web
    name: spinqms-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /api/*
        destination: https://spinqms-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
